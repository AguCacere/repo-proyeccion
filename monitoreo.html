            </svg>

        </div>
        <nav>
            <div class="nav-section-label">Menú</div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="location.href='home.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Inicio</span>
                </li>
                <li class="nav-item" onclick="location.href='index.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    <span>Dashboard</span>
                </li>
                <li class="nav-item active" onclick="location.href='monitoreo.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span>Monitoreo</span>

                <li class="nav-item" onclick="alert('Configuración en desarrollo')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

                </li>
            </ul>
        </nav>
        <div class="nav-footer">
            <span class="nav-footer-version">v1.0</span>
            <div class="nav-footer-status">
                <span class="nav-footer-dot"></span>
                <span>Online</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="dashboard-topbar">
            <div class="title-section">
                <h1>Monitoreo de Horarios</h1>
                <div class="topbar-filters">
                    <div class="date-input-wrapper custom-month-wrapper">
                        <div class="custom-month-trigger" id="customMonthTrigger">
                            <span id="customMonthDisplay">Seleccionar mes</span>
                            <i class="calendar-icon">📅</i>
                        </div>
                        <input type="hidden" id="filterMonth" value="">
                        <div class="custom-month-dropdown" id="customMonthDropdown">
                            <div class="cmd-header">
                                <button class="cmd-btn-nav" id="cmdPrevYear">◀</button>
                                <span class="cmd-year" id="cmdCurrentYear">2026</span>
                                <button class="cmd-btn-nav" id="cmdNextYear">▶</button>
                            </div>
                            <div class="cmd-grid" id="cmdMonthGrid"></div>
                            <div class="cmd-footer">
                                <button class="cmd-btn-clear" id="cmdClearBtn">Borrar</button>
                                <button class="cmd-btn-today" id="cmdTodayBtn">Este mes</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Elementos ocultos para compatibilidad con app.js -->
            <select id="filterType" style="display: none;"><option value="all">Todos</option></select>
        </div>

        <!-- Resumen Global de Monitoreo -->
        <div id="globalMonitoringKPIs" class="global-kpi-container" style="margin-bottom: 32px;">
            <!-- Inyectado por JS -->
        </div>

        <!-- Contenedor de Grupos de Monitoreo -->
        <div id="monitoringGroups" class="monitoring-groups-container">
            <!-- Inyectado por JS -->
            <div class="loading-placeholder">Cargando grupos de monitoreo...</div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
